<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Splitter</title>
<style>
body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045);
}

.container {
    width: 90%;
    max-width: 700px;
    background: white;
    padding: 35px;
    border-radius: 14px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    text-align: center;
}

h2 {
    margin-bottom: 15px;
}

textarea {
    width: 100%;
    height: 150px;
    padding: 12px;
    font-size: 15px;
    border-radius: 8px;
    border: 1px solid #ddd;
    resize: none;
}

textarea:focus {
    outline: none;
    border-color: #e1306c;
}

button {
    margin: 10px 5px 15px 5px;
    padding: 12px 20px;
    border: none;
    border-radius: 8px;
    background: #e1306c;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #c72c61;
    transform: scale(1.05);
}

.output {
    margin-top: 25px;
    text-align: left;
}

.output ul {
    list-style: none;
    padding: 0;
}

.output li {
    background: #f5f5f5;
    padding: 10px;
    margin-bottom: 6px;
    border-radius: 6px;
    font-family: monospace;
}

#copyAllBtn {
    background: #333;
    color: white;
    margin-top: 10px;
    display: none;
}

#copyAllBtn:hover {
    background: black;
}
</style>
</head>
<body>

<div class="container">
    <h2>Text Splitter</h2>
    <textarea id="inputText" placeholder="Paste here"></textarea><br>
    <button onclick="formatText(',')">Split with ","</button>
    <button onclick="formatTextSql()">Split with SQL Format</button>

    <div class="output">
        <h3>Results:</h3>
        <ul id="resultList"></ul>
        <button id="copyAllBtn" onclick="copyAllParts()">Copy All</button>
    </div>
</div>

<script>
function formatText(separator) {
    let input = document.getElementById("inputText").value;
    let items = input.split(/\s+/).filter(item => item.trim() !== "");
    showResults(items.join(separator));
}

function formatTextSql() {
    let input = document.getElementById("inputText").value;
    let items = input.split(/\s+/).filter(item => item.trim() !== "");
    let formatted = "('" + items.join("','") + "')";
    showResults(formatted);
}

function showResults(result) {
    const resultList = document.getElementById("resultList");
    const copyBtn = document.getElementById("copyAllBtn");
    resultList.innerHTML = '';

    if (Array.isArray(result)) {
        result.forEach(item => {
            const li = document.createElement('li');
            li.textContent = item;
            resultList.appendChild(li);
        });
    } else {
        // Se è stringa, crea un solo li
        const li = document.createElement('li');
        li.textContent = result;
        resultList.appendChild(li);
    }

    copyBtn.style.display = resultList.children.length > 0 ? 'block' : 'none';
}

function copyAllParts() {
    const parts = Array.from(document.querySelectorAll('#resultList li'))
        .map(li => li.textContent)
        .join('\n');
    navigator.clipboard.writeText(parts);
    alert('All parts copied!');
}
</script>

</body>
</html>
